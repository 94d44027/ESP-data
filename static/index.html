<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP PoC - Attack Path Visualization</title>

    <!-- Cytoscape.js library from CDN (REQ-010) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>

    <!-- Application stylesheet (UI-REQ-401) -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- Top Bar (UI-REQ-110) -->
    <div class="topbar">
        <div class="topbar-title">ESP PoC - Attack Path Visualization</div>
        <div class="topbar-actions">
            <div class="stats">
                <div class="stat-item">
                    <span>Nodes:</span>
                    <span class="stat-value" id="stat-nodes">0</span>
                </div>
                <div class="stat-item">
                    <span>Edges:</span>
                    <span class="stat-value" id="stat-edges">0</span>
                </div>
            </div>
            <button class="btn btn-icon" id="btn-toggle-sidebar" title="Toggle Sidebar">☰</button>
            <button class="btn btn-icon" id="btn-toggle-inspector" title="Toggle Inspector">ℹ</button>
            <button class="btn btn-primary" id="btn-refresh">Refresh</button>
        </div>
    </div>

    <!-- Left Sidebar - Entity Browser (UI-REQ-120) -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Assets</div>
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search-input" placeholder="Search assets...">
            </div>
        </div>

        <!-- Asset Type Filters (UI-REQ-122) -->
        <div class="filter-section">
            <div class="filter-title">Asset Types</div>
            <div class="filter-group" id="filter-types">
                <!-- Populated dynamically via JavaScript -->
            </div>
        </div>

        <!-- Asset List (UI-REQ-120) -->
        <div class="asset-list-container">
            <div id="asset-list">
                <!-- Populated dynamically via JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main Canvas - Graph Visualization (UI-REQ-200) -->
    <div class="main-canvas" id="main-canvas">
        <div id="cy"></div>
    </div>

    <!-- Right Inspector Panel (UI-REQ-210) -->
    <div class="inspector" id="inspector">
        <div class="inspector-header">
            <div class="inspector-title">Inspector</div>
        </div>
        <div class="inspector-content" id="inspector-content">
            <div class="inspector-empty">
                Select a node to view details
            </div>
        </div>
    </div>

    <!-- Application JavaScript (UI-REQ-401: modular file structure) -->
    <!-- Load order: state first, then API, then features, app.js last -->
    <script src="js/state.js"></script>
    <script src="js/api.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/inspector.js"></script>
    <script src="js/edge-inspector.js"></script>
    <script src="js/ui-controls.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
